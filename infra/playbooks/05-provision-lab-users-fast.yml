---
- name: Fast provision lab users from CSV (remote-side key fetch)
  hosts: k8s_control_plane
  become: true
  vars:
    csv_file: "{{ playbook_dir }}/../users.csv"
    kubeconfig_source: "/home/dev/.kube/admin.conf"

  tasks:
    - name: Create temporary directory on remote
      ansible.builtin.file:
        path: /tmp/user-provisioning
        state: directory
        mode: '0755'

    - name: Upload users CSV to remote
      ansible.builtin.copy:
        src: "{{ csv_file }}"
        dest: /tmp/user-provisioning/users.csv
        mode: '0644'

    - name: Upload provisioning scripts to remote
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/"
        dest: /tmp/user-provisioning/scripts/
        mode: preserve

    - name: Upload GitHub PAT .env file to remote
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.env"
        dest: /tmp/user-provisioning/.env
        mode: '0600'

    - name: Generate provisioning script on remote
      ansible.builtin.shell:
        cmd: |
          cd /tmp/user-provisioning
          . ./.env
          ./scripts/generate-provision-script.py users.csv provision-users.sh
        executable: /bin/bash
      changed_when: true

    - name: Run provisioning script on remote
      ansible.builtin.command:
        cmd: /tmp/user-provisioning/provision-users.sh
      register: provision_output
      changed_when: true

    - name: Display provisioning output
      ansible.builtin.debug:
        var: provision_output.stdout_lines

    - name: Clean up temporary directory
      ansible.builtin.file:
        path: /tmp/user-provisioning
        state: absent
