[defaults]
# Disable host key checking for fresh lab VMs
host_key_checking = False

# Point to our roles directory
roles_path = playbooks/roles

# Better output readability
stdout_callback = yaml

# Inventory file
inventory = inventory/

# Don't create .retry files
retry_files_enabled = False

# Increase timeout for slow operations
timeout = 30

[ssh_connection]
# SSH performance settings
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
# Increase SSH timeout
timeout = 30
# Disable pipelining temporarily to avoid privilege escalation issues
pipelining = False

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
